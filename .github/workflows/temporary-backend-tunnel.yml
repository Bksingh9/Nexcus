name: Temporary Nexcus backend tunnel

on:
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: "How long the temporary tunnel should remain available"
        required: false
        default: "300"
        type: string
  push:
    paths:
      - ".github/workflows/temporary-backend-tunnel.yml"

permissions:
  contents: read
  deployments: write

concurrency:
  group: nexcus-temporary-backend-tunnel
  cancel-in-progress: true

jobs:
  tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_DB: nexcus
          POSTGRES_USER: nexcus
          POSTGRES_PASSWORD: nexcus_ephemeral_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexcus -d nexcus"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
      redis:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 30

    env:
      NODE_ENV: production
      WEBAPP_URL: http://127.0.0.1:3000
      NEXTAUTH_URL: http://127.0.0.1:3000
      DATABASE_URL: postgresql://nexcus:nexcus_ephemeral_password@127.0.0.1:5432/nexcus
      REDIS_URL: redis://127.0.0.1:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Generate ephemeral server secrets
        shell: bash
        run: |
          set -euo pipefail
          for key in NEXTAUTH_SECRET ENCRYPTION_KEY CRON_SECRET FEEDBACKOS_SESSION_SECRET HUB_API_KEY CUBEJS_API_SECRET; do
            printf '%s=%s\n' "$key" "$(openssl rand -hex 32)" >> "$GITHUB_ENV"
          done

      - name: Install and migrate
        run: |
          pnpm install --frozen-lockfile
          pnpm db:migrate

      - name: Build and start backend
        shell: bash
        run: |
          set -euo pipefail
          pnpm build
          nohup pnpm start > "$RUNNER_TEMP/nexcus.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/nexcus.pid"
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:3000/api/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat "$RUNNER_TEMP/nexcus.log"
          exit 1

      - name: Start Cloudflare quick tunnel
        id: tunnel
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 5 \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            --output "$RUNNER_TEMP/cloudflared"
          chmod +x "$RUNNER_TEMP/cloudflared"
          nohup "$RUNNER_TEMP/cloudflared" tunnel --no-autoupdate --url http://127.0.0.1:3000 \
            > "$RUNNER_TEMP/cloudflared.log" 2>&1 &
          for attempt in $(seq 1 60); do
            tunnel_url="$(grep -Eo 'https://[a-z0-9-]+\.trycloudflare\.com' "$RUNNER_TEMP/cloudflared.log" | head -n 1 || true)"
            if [ -n "$tunnel_url" ]; then
              echo "url=$tunnel_url" >> "$GITHUB_OUTPUT"
              echo "TUNNEL_URL=$tunnel_url" >> "$GITHUB_ENV"
              exit 0
            fi
            sleep 2
          done
          cat "$RUNNER_TEMP/cloudflared.log"
          exit 1

      - name: Publish temporary deployment URL
        uses: actions/github-script@v7
        env:
          TUNNEL_URL: ${{ steps.tunnel.outputs.url }}
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: "temporary-backend-tunnel",
              description: "Ephemeral GitHub runner staging tunnel; data is discarded when the job ends.",
              auto_merge: false,
              required_contexts: [],
            });
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: "success",
              environment_url: process.env.TUNNEL_URL,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: "Temporary tunnel is available until this workflow ends.",
            });
            await core.summary
              .addHeading("Temporary Nexcus backend")
              .addLink(process.env.TUNNEL_URL, process.env.TUNNEL_URL)
              .addRaw("\n\nThis URL is ephemeral. PostgreSQL and Valkey run only for this GitHub Actions job; all data is discarded when it ends.")
              .write();

      - name: Keep tunnel available
        shell: bash
        env:
          DURATION_MINUTES: ${{ inputs.duration_minutes || 300 }}
        run: |
          set -euo pipefail
          duration="${DURATION_MINUTES:-300}"
          if ! [[ "$duration" =~ ^[0-9]+$ ]] || [ "$duration" -lt 5 ] || [ "$duration" -gt 340 ]; then
            echo "duration_minutes must be between 5 and 340"
            exit 1
          fi
          sleep "$((duration * 60))"

      - name: Print service logs on failure
        if: failure()
        shell: bash
        run: |
          cat "$RUNNER_TEMP/nexcus.log" 2>/dev/null || true
          cat "$RUNNER_TEMP/cloudflared.log" 2>/dev/null || true
