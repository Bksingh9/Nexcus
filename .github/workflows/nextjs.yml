name: Verify FeedbackOS static site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify public entrypoint
        shell: bash
        run: |
          test -f outputs/index.html
          grep -q '<title>FeedbackOS</title>' outputs/index.html
          grep -q 'Command center' outputs/index.html
