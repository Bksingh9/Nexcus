name: nexcus

services:
  postgres:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexcus
      POSTGRES_USER: nexcus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexcus -d nexcus"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  migrate:
    build: .
    restart: "no"
    command: ["pnpm", "db:migrate"]
    environment:
      DATABASE_URL: postgresql://nexcus:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/nexcus
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://nexcus:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/nexcus
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
  redis-data:
